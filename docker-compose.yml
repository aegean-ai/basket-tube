services:
  # ── CPU API orchestrator ──────────────────────────────────────────
  api:
    container_name: basket-tube-api
    profiles: [nvidia, cpu]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    restart: unless-stopped
    network_mode: host
    command: ["uv", "run", "uvicorn", "api.src.main:app", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      - FW_INFERENCE_ROBOFLOW_URL=http://localhost:8091
      - FW_INFERENCE_VISION_URL=http://localhost:8092
    volumes:
      - ./pipeline_data:/app/pipeline_data
      - ./video_registry.yml:/app/video_registry.yml:ro
      - ./api:/app/api
    # Binds to :8080

  # ── inference-roboflow (GPU) — detection, keypoints, OCR ─────────
  inference-roboflow:
    container_name: basket-tube-roboflow
    profiles: [nvidia]
    build:
      context: .
      dockerfile: Dockerfile.roboflow
    restart: unless-stopped
    network_mode: host
    shm_size: "8gb"
    environment:
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY:-}
      - INFERENCE_MODE=${INFERENCE_MODE:-local}
      - BT_DATA_DIR=/app/pipeline_data/api
    volumes:
      - ./pipeline_data:/app/pipeline_data
      - ./video_registry.yml:/app/video_registry.yml:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Binds to :8091

  # ── inference-vision (GPU) — SAM2 tracking, team classification ──
  inference-vision:
    container_name: basket-tube-vision
    profiles: [nvidia]
    build:
      context: .
      dockerfile: Dockerfile.vision
    restart: unless-stopped
    network_mode: host
    shm_size: "8gb"
    environment:
      - SAM2_REPO=/opt/segment-anything-2-real-time
      - HF_TOKEN=${HF_TOKEN:-}
      - BT_DATA_DIR=/app/pipeline_data/api
    volumes:
      - ./pipeline_data:/app/pipeline_data
      - ./video_registry.yml:/app/video_registry.yml:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Binds to :8092

  # ── Notebook (Jupyter + GPU) ─────────────────────────────────────
  notebook:
    container_name: basket-tube-notebook
    profiles: [nvidia]
    build:
      context: .
      dockerfile: Dockerfile.vision
    restart: unless-stopped
    network_mode: host
    shm_size: "8gb"
    command: ["jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--NotebookApp.token=''", "--NotebookApp.password=''"]
    environment:
      - SAM2_REPO=/opt/segment-anything-2-real-time
      - HF_TOKEN=${HF_TOKEN:-}
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY:-}
      - ONNXRUNTIME_EXECUTION_PROVIDERS=[CUDAExecutionProvider]
    volumes:
      - ./pipeline_data:/app/pipeline_data
      - ./video_registry.yml:/app/video_registry.yml:ro
      - ./notebooks:/workspace/notebooks
      - notebook-cache:/home/vscode/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Binds to :8888

volumes:
  notebook-cache:
